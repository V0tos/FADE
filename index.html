<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FADE - AI Hair Analysis</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="icon" href="ChatGPT Image Nov 7, 2025 at 07_51_14 PM copy 4.png">

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
body {
    background: #000;
    color: white;
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
}

/* WRAPPER */
.wrapper {
    max-width: 520px;
    margin: 0 auto;
    padding: 24px;
}

/* NAV */
.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.nav-left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.nav img {
    width: 28px;
    height: 28px;
    border-radius: 8px;
}

.nav h2 {
    font-size: 18px;
    font-weight: 600;
}

/* BUTTON */
.support-btn {
    background: #fff;
    color: #000;
    padding: 8px 14px;
    border-radius: 12px;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s ease;
}

.support-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(255,255,255,0.15);
}

/* HERO */
.hero {
    text-align: center;
    margin-top: 50px;
}

.hero h1 {
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.5px;
}

.hero p {
    font-size: 15px;
    color: #aaa;
    margin-top: 12px;
    line-height: 1.6;
}

/* STATS */
.stats {
    display: flex;
    justify-content: space-between;
    margin-top: 40px;
    text-align: center;
}

.stats h1 {
    font-size: 22px;
    font-weight: 600;
}

.stats p {
    font-size: 11px;
    color: #777;
    letter-spacing: 1px;
}

/* DOWNLOAD */
.download {
    text-align: center;
    margin: 25px 0;
}

.appstore-btn img {
    width: 180px;
    transition: transform 0.2s ease;
}

.appstore-btn img:hover {
    transform: scale(1.05);
}

/* MOCKUP SECTION */
.mockup {
    display: flex;
    justify-content: center;
    margin-top: 30px;
    position: relative;
}

/* PHONE FRAME */
.phone {
    position: relative;
    border-radius: 36px;
    overflow: hidden;
    border: 12px solid #111;
    box-shadow: 
        0 0 40px rgba(0,255,140,0.25),
        0 20px 60px rgba(0,0,0,0.6);
    z-index: 2;
}

/* IMAGE INSIDE */
.phone img {
    width: 100%;
    max-width: 260px;
    display: block;

    /* THIS FIXES YOUR "ROUGH" LOOK */
    image-rendering: auto;
    filter: contrast(1.02) saturate(1.05);

    transition: transform 0.4s ease;
}

.phone:hover img {
    transform: scale(1.03);
}

/* FOOTER */
footer {
    text-align: center;
    margin-top: 50px;
    font-size: 13px;
    color: #666;
}

footer a {
    color: #888;
    text-decoration: none;
    margin: 0 8px;
}

footer a:hover {
    color: white;
}

/* MOBILE */
@media (max-width: 480px) {

    .hero h1 {
        font-size: 28px;
    }

    .phone img {
        max-width: 230px;
    }
}

</style>

</head>

<body>

<div class="wrapper">

<!-- NAV -->
<div class="nav">
    <div class="nav-left">
        <img src="ChatGPT Image Nov 7, 2025 at 07_51_14 PM copy 4.png">
        <h2>FADE</h2>
    </div>

    <a href="support.html" class="support-btn">Support</a>
</div>

<!-- HERO -->
<div class="hero">
    <h1>Find Your Best Haircut</h1>
    <p>AI analyzes your facial structure and recommends hairstyles that actually fit your face.</p>
</div>

<!-- STATS -->
<div class="stats">
    <div>
        <h1>1K+</h1>
        <p>USERS</p>
    </div>
    <div>
        <h1>4.5★</h1>
        <p>APP RATING</p>
    </div>
    <div>
        <h1>95%</h1>
        <p>MATCH ACCURACY</p>
    </div>
</div>

<!-- DOWNLOAD -->
<div class="download">
    <a href="https://apps.apple.com/us/app/fade-ai-improve-your-looks/id6759229605" target="_blank" class="appstore-btn">
        <img src="toppng.com-app-store-official-download-badge-png-2970x1980.png">
    </a>
</div>

<!-- PHONE MOCKUP -->
<div class="mockup">
    <div class="phone">
        <img src="ChatGPT Image Apr 8, 2026 at 11_22_54 AM.png">
    </div>
</div>

<!-- FOOTER -->
<footer>
    <a href="/faq">FAQ</a> |
    <a href="/terms">Terms</a> |
    <a href="/privacy">Privacy</a>
</footer>

</div>

</body>
</html>
