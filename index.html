<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
body {
    background: #000;
    color: white;
    font-family: 'Satoshi', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
}

/* WRAPPER */
.wrapper {
    max-width: 520px;
    margin: 0 auto;
    padding: 24px;
}

/* NAV */
.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.nav-left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.nav img {
    width: 28px;
    height: 28px;
    border-radius: 8px;
}

.nav h2 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
}

/* BUTTON */
.support-btn {
    background: #fff;
    color: #000;
    padding: 9px 16px;
    border-radius: 14px;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.2px;
    transition: all 0.2s ease;
}

.support-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(255,255,255,0.15);
}

/* HERO */
.hero {
    text-align: center;
    margin-top: 60px;
}

.hero h1 {
    font-size: 38px;
    font-weight: 700;
    letter-spacing: -1px;
}

.hero p {
    font-size: 16px;
    color: #999;
    margin-top: 14px;
    line-height: 1.7;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
}

/* STATS */
.stats {
    display: flex;
    justify-content: space-between;
    margin-top: 45px;
    text-align: center;
}

.stats h1 {
    font-size: 24px;
    font-weight: 700;
}

.stats p {
    font-size: 10px;
    color: #666;
    letter-spacing: 1.5px;
}

/* DOWNLOAD */
.download {
    text-align: center;
    margin: 30px 0;
}

.appstore-btn img {
    width: 180px;
    transition: transform 0.2s ease;
}

.appstore-btn img:hover {
    transform: scale(1.05);
}

/* MOCKUP SECTION */
.mockup {
    display: flex;
    justify-content: center;
    margin-top: 30px;
}

/* PHONE FRAME (CLEAN, NO GLOW) */
.phone {
    position: relative;
    border-radius: 36px;
    overflow: hidden;
    border: 12px solid #111;
    box-shadow: 
        0 10px 30px rgba(0,0,0,0.8),
        0 0 0 1px rgba(255,255,255,0.04);
}

/* IMAGE */
.phone img {
    width: 100%;
    max-width: 260px;
    display: block;
    image-rendering: auto;
    filter: contrast(1.02) saturate(1.05);
    transition: transform 0.4s ease;
}

.phone:hover img {
    transform: scale(1.03);
}

/* FOOTER */
footer {
    text-align: center;
    margin-top: 60px;
    font-size: 13px;
    color: #555;
}

footer a {
    color: #777;
    text-decoration: none;
    margin: 0 8px;
}

footer a:hover {
    color: white;
}

/* MOBILE */
@media (max-width: 480px) {

    .hero h1 {
        font-size: 30px;
    }

    .phone img {
        max-width: 230px;
    }
}
